name: for-production
services:
  webserver:
    image: nginx:latest
    container_name: blog-web
    ports:
      - "80:80"
      - "443:443"
    networks:
      - blognetwork
    depends_on:
      - backend
    volumes:
      - './libs/app1.conf:/etc/nginx/conf.d/default.conf'
  backend:
    image: ghcr.io/fa-50/blog-practice:latest
    container_name: blog-backend
    depends_on:
      - db
    env_file:
      - .env.development
    ports:
      - "8080:8080"
    networks:
      - blognetwork
  db:
    image: mysql:latest
    container_name: blog-mysql
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env.development
    networks:
      - blognetwork
volumes:
  mysql_data:
networks:
  blognetwork:
    driver: bridge