name: demo
services:
  lb:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - lb_data:/data
      - lb_data:/etc/letsencrypt
    networks:
      - blognetwork
  backend:
    image: ghcr.io/fa-50/blog-practice:latest
    container_name: blog-backend
    depends_on:
      - db
    env_file:
      - .env.production
    # ports를 설정하지 않아도 동일한 네트워크로 구성되있으므로 하지 않아도됨.
    ports:
      - "8080:8080"
    networks:
      - blognetwork
  db:
    image: mysql:latest
    container_name: blog-mysql
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env.production
    networks:
      - blognetwork
volumes:
  mysql_data:
  lb_data:
networks:
  blognetwork:
    driver: bridge