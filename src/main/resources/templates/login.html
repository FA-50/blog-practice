<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #172033; background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #e0f2fe 100%); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .login-card { width: min(100%, 420px); padding: 42px; border: 1px solid rgba(148, 163, 184, .25); border-radius: 28px; background: rgba(255, 255, 255, .92); box-shadow: 0 24px 70px rgba(30, 41, 59, .14); }
        h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -.04em; }
        .description { margin: 0 0 32px; color: #64748b; }
        label { display: block; margin: 18px 0 8px; font-weight: 700; }
        input { width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 14px; background: #fff; font: inherit; outline: none; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, .12); }
        button { width: 100%; margin-top: 26px; padding: 15px; border: 0; border-radius: 14px; color: #fff; background: #2563eb; font: inherit; font-weight: 800; cursor: pointer; }
        button:disabled { cursor: wait; opacity: .65; }
        .error { min-height: 22px; margin: 14px 0 0; color: #dc2626; font-size: 14px; }
        .success { min-height: 22px; margin: 0 0 12px; color: #15803d; font-size: 14px; }
        .footer { margin: 20px 0 0; text-align: center; color: #64748b; font-size: 14px; }
        .footer a { color: #2563eb; font-weight: 700; text-decoration: none; }
    </style>
    <script src="/js/login.js" defer></script>
</head>
<body>
<main class="login-card">
    <h1>로그인</h1>
    <p class="description">계정으로 로그인해 게시글과 댓글을 관리하세요.</p>
    <p id="loginSuccess" class="success" role="status" aria-live="polite"></p>
    <form id="loginForm">
        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" autocomplete="username" required autofocus>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button id="loginButton" type="submit">로그인</button>
        <p id="loginError" class="error" role="alert" aria-live="polite"></p>
    </form>
    <p class="footer">계정이 없나요? <a href="/signup">회원가입</a></p>
</main>
</body>
</html>
