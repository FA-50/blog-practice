<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>

<h1>게시글 수정</h1>

<form th:action="@{/posts/{postId}/edit(postId=${post.postId})}" method="post">
    <div>
        <label for="title">제목</label>
        <input type="text" id="title" name="title" th:value="${post.title}">
    </div>

    <div>
        <label for="content">내용</label>
        <textarea id="content" name="content" th:text="${post.content}"></textarea>
    </div>

    <div>
        <label for="visibility">공개 여부</label>
        <select id="visibility" name="visibility">
            <option value="PUBLIC" th:selected="${post.visibility.name() == 'PUBLIC'}">공개</option>
            <option value="PRIVATE" th:selected="${post.visibility.name() == 'PRIVATE'}">비공개</option>
        </select>
    </div>

    <button type="submit">수정</button>
</form>

<a th:href="@{/posts/{postId}(postId=${post.postId})}">상세로 돌아가기</a>
<br>
<a th:href="@{/posts}">목록으로</a>

</body>
</html>
