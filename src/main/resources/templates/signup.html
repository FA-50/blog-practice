<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #172033; background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #e0f2fe 100%); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .signup-card { width: min(100%, 440px); padding: 42px; border: 1px solid rgba(148, 163, 184, .25); border-radius: 28px; background: rgba(255, 255, 255, .92); box-shadow: 0 24px 70px rgba(30, 41, 59, .14); }
        h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -.04em; }
        .description { margin: 0 0 28px; color: #64748b; }
        label { display: block; margin: 17px 0 8px; font-weight: 700; }
        input { width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 14px; background: #fff; font: inherit; outline: none; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, .12); }
        .hint { display: block; margin-top: 6px; color: #64748b; font-size: 12px; }
        button { width: 100%; margin-top: 26px; padding: 15px; border: 0; border-radius: 14px; color: #fff; background: #2563eb; font: inherit; font-weight: 800; cursor: pointer; }
        button:disabled { cursor: wait; opacity: .65; }
        .error { min-height: 22px; margin: 14px 0 0; color: #dc2626; font-size: 14px; }
        .footer { margin: 20px 0 0; text-align: center; color: #64748b; font-size: 14px; }
        .footer a { color: #2563eb; font-weight: 700; text-decoration: none; }
    </style>
    <script src="/js/signup.js" defer></script>
</head>
<body>
<main class="signup-card">
    <h1>회원가입</h1>
    <p class="description">새 계정을 만들고 블로그를 시작하세요.</p>
    <form id="signupForm">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" maxlength="10" autocomplete="name" required autofocus>

        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" minlength="4" maxlength="30" pattern="[A-Za-z0-9_-]+" autocomplete="username" required>
        <span class="hint">영문, 숫자, 밑줄, 하이픈으로 4~30자</span>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" minlength="8" maxlength="72" autocomplete="new-password" required>

        <label for="passwordConfirm">비밀번호 확인</label>
        <input id="passwordConfirm" name="passwordConfirm" type="password" minlength="8" maxlength="72" autocomplete="new-password" required>

        <button id="signupButton" type="submit">가입하기</button>
        <p id="signupError" class="error" role="alert" aria-live="polite"></p>
    </form>
    <p class="footer">이미 계정이 있나요? <a href="/login">로그인</a></p>
</main>
</body>
</html>
